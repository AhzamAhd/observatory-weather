name: Daily Observatory Weather Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetcher
        run: python fetch_weather.py

      - name: Run database loader
        run: python load_database.py

      - name: Run scoring
        run: python score_quality.py

      - name: Run visualisation
        run: python visualize.py
      
      - name: Run alert checker
        run: python alert_system.py
        continue-on-error: true
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_PASSWORD: ${{ secrets.ALERT_PASSWORD }}
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}

      - name: Commit results to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "auto: daily weather update $(date -u '+%Y-%m-%d')"
          git push
name: Daily Observatory Weather Pipeline

on:
  schedule:
    - cron: '0 6 * * *'    # Runs every day at 06:00 UTC
  workflow_dispatch:         # Allows manual trigger from GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download existing database
        uses: actions/download-artifact@v4
        with:
          name: observatory-db
          path: data/silver/
        continue-on-error: true

      - name: Run fetcher
        run: python fetch_weather.py

      - name: Run database loader
        run: python load_database.py

      - name: Run scoring
        run: python score_quality.py

      - name: Run visualisation
        run: python visualise.py

      - name: Upload updated database
        uses: actions/upload-artifact@v4
        with:
          name: observatory-db
          path: data/silver/observatory_weather.db
          retention-days: 7

      - name: Commit charts and scores to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/gold/
          git diff --staged --quiet || git commit -m "auto: daily weather update $(date -u '+%Y-%m-%d')"
          git push